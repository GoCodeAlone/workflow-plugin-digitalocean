version: 2

project_name: workflow-plugin-digitalocean

before:
  hooks:
    - go mod tidy

builds:
  - id: workflow-plugin-digitalocean
    main: ./cmd/plugin
    binary: workflow-plugin-digitalocean
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: workflow-plugin-digitalocean
    builds:
      - workflow-plugin-digitalocean
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-digitalocean
